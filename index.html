*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0b0f19;color:white;min-height:100vh;}

header{background:#e10600;padding:16px 12px;text-align:center;}
header h1{font-size:20px;font-weight:bold;letter-spacing:0.5px;}
header p{font-size:12px;opacity:0.85;margin-top:4px;}

.nav{display:flex;overflow-x:auto;gap:6px;padding:10px 10px 0;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;background:#1a2338;border:1px solid #2a3550;color:#aaa;padding:7px 13px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.nav-btn.active,.nav-btn:hover{background:#e10600;color:white;border-color:#e10600;}
.nav-btn.live-nav{border-color:#00ff88;color:#00ff88;}
.nav-btn.live-nav.active{background:#00ff88;color:#000;}

.container{padding:10px;}

/* GP Cards */
.gp-card{background:#141b2d;border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid #1e2a40;transition:border-color 0.2s;}
.gp-card.active-card{border-color:#e10600;box-shadow:0 0 20px rgba(225,6,0,0.2);}
.gp-card.live-card{border-color:#00ff88;box-shadow:0 0 20px rgba(0,255,136,0.2);}

.gp-header{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;}
.round-badge{background:#e10600;color:white;font-size:10px;font-weight:bold;padding:3px 7px;border-radius:4px;flex-shrink:0;}
.sprint-badge{background:#ff9500;color:black;font-size:9px;font-weight:bold;padding:2px 5px;border-radius:3px;flex-shrink:0;}
.sat-badge{background:#aa44ff;color:white;font-size:9px;font-weight:bold;padding:2px 5px;border-radius:3px;flex-shrink:0;}
.live-badge{background:#00ff88;color:#000;font-size:9px;font-weight:bold;padding:2px 6px;border-radius:3px;flex-shrink:0;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}

.gp-title-block{flex:1;min-width:0;text-align:left;}
.gp-name{font-size:14px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gp-circuit{font-size:11px;color:#8899bb;margin-top:2px;}
.gp-dates{font-size:11px;color:#aaa;flex-shrink:0;text-align:right;}
.gp-flag{font-size:22px;flex-shrink:0;}

.gp-body{padding:0 15px 15px;display:none;}
.gp-body.open{display:block;}

.timer-block{background:#0b0f19;border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.timer-label{font-size:11px;color:#8899bb;}
.timer-val{font-size:16px;font-weight:bold;color:#00ffcc;font-family:monospace;}
.status-live{color:#00ff88;font-weight:bold;font-size:13px;}
.status-done{color:#666;font-size:13px;}

.channels-title{font-size:11px;color:#8899bb;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.channel-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.ch-btn{background:#1a2338;border:1px solid #2a3550;color:white;padding:9px 8px;border-radius:8px;font-size:12px;cursor:pointer;text-align:center;transition:background 0.15s;}
.ch-btn:hover{background:#2a3550;}
.ch-btn.highlight{border-color:#e10600;background:#1f0f0f;}
.ch-btn.free{border-color:#00ff88;background:#001a0e;}
.ch-btn span{display:block;font-size:10px;color:#666;margin-top:2px;}

.vpn-tip{background:#0f1a2e;border:1px solid #1e3a5f;border-radius:8px;padding:10px 12px;font-size:12px;color:#8899bb;margin-top:6px;}
.vpn-tip strong{color:#4da6ff;}

.timing-btn{width:100%;background:#e10600;border:none;color:white;padding:10px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:8px;}
.timing-btn:hover{background:#c00500;}

/* Summary bar */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.sum-box{background:#141b2d;border-radius:10px;padding:12px 8px;text-align:center;border:1px solid #1e2a40;}
.sum-num{font-size:24px;font-weight:bold;}

.sum-num.red{color:#e10600;}
.sum-num.green{color:#00ff88;}
.sum-num.orange{color:#ff9500;}

.section-label{font-size:11px;color:#8899bb;text-transform:uppercase;letter-spacing:0.5px;padding:8px 0 4px;border-top:1px solid #1e2a40;margin-bottom:6px;}

let currentFilter = 'all';

let timers = {};

function pad(n){return String(n).padStart(2,'0');}

function getCountdown(dateStr){
  const now = new Date();
  const target = new Date(dateStr);
  const diff = target - now;
  if(diff <= 0) return null;
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  if(d > 0) return `${d}d ${pad(h)}h ${pad(m)}m`;
  return `${pad(h)}h ${pad(m)}m ${pad(s)}s`;
}

function getStatus(gp){
  const now = new Date();
  const start = new Date(gp.eventStart);
  const race = new Date(gp.raceStart);
  const end = new Date(race.getTime() + 3*3600000);
  if(now >= start && now <= end) return 'live';
  if(now > end) return 'done';
  return 'upcoming';
}

function renderGPs(filter){
  const list = document.getElementById('gpList');
  list.innerHTML = '';
  const now = new Date();

  let shown = GPS.filter(gp => {
    if(filter === 'all') return true;
    if(filter === 'live') return getStatus(gp) === 'live';
    if(filter === 'sprint') return gp.sprint;
    return gp.region === filter;
  });

  if(shown.length === 0){
    list.innerHTML = '<div style="text-align:center;color:#555;padding:30px;font-size:14px;">Sin carreras en este filtro</div>';
    return;
  }

  // Section: upcoming vs past
  const upcoming = shown.filter(g => getStatus(g) !== 'done');
  const past = shown.filter(g => getStatus(g) === 'done');

  if(upcoming.length) renderSection(upcoming, list, false);
  if(past.length){
    const div = document.createElement('div');
    div.className = 'section-label';
    div.textContent = 'Ya disputadas esta temporada';
    list.appendChild(div);
    renderSection(past, list, true);
  }

  startTimers();
}

function renderSection(gps, container, isPast){
  gps.forEach(gp => {
    const status = getStatus(gp);
    const card = document.createElement('div');
    card.className = 'gp-card' + (status==='live'?' live-card':'') + (status==='upcoming'&&gps[0]===gp?' active-card':'');
    card.id = 'card-'+gp.round;

    const isOpen = openCards.has(gp.round);

    let badges = `<span class="round-badge">R${gp.round}</span>`;
    if(status==='live') badges += ' <span class="live-badge">🔴 LIVE</span>';
    if(gp.sprint) badges += ' <span class="sprint-badge">SPRINT</span>';
    if(gp.saturday) badges += ' <span class="sat-badge">SAT</span>';

    const timerVal = getCountdown(gp.eventStart);
    let timerHtml = '';
    if(status==='live'){
      timerHtml = `<div class="timer-block"><span class="timer-label">Estado</span><span class="status-live">🔴 EVENTO EN VIVO</span></div>`;
    } else if(status==='done'){
      timerHtml = `<div class="timer-block"><span class="timer-label">Estado</span><span class="status-done">✅ Finalizada</span></div>`;
    } else {
      timerHtml = `<div class="timer-block"><span class="timer-label">Comienza en</span><span class="timer-val" id="timer-${gp.round}">${timerVal||'—'}</span></div>`;
    }

    const channelBtns = gp.channels.map(ch =>
      `<button class="ch-btn${ch.highlight?' highlight':''}${ch.free?' free':''}" onclick="window.open('${ch.url}','_blank')">${ch.label}${ch.free?'<span>Gratis con VPN</span>':''}</button>`
    ).join('');

    card.innerHTML = `
      <div class="gp-header" onclick="toggleCard(${gp.round})">
        <span class="gp-flag">${gp.flag}</span>
        <div class="gp-title-block">
          <div class="gp-name">${gp.name}</div>
          <div class="gp-circuit">${gp.circuit}</div>
        </div>
        <div>
          <div>${badges}</div>
          <div class="gp-dates" style="margin-top:4px;">${gp.dates}</div>
        </div>
      </div>
      <div class="gp-body${isOpen?' open':''}" id="body-${gp.round}">
        ${timerHtml}
        <div class="channels-title">Dónde ver</div>
        <div class="channel-grid">${channelBtns}</div>
        ${gp.vpn ? `<div class="vpn-tip">💡 <strong>Gratis:</strong> ${gp.vpn}</div>` : ''}
        <button class="timing-btn" onclick="window.open('https://www.formula1.com/en/f1-live.html','_blank')">📡 F1 Live Timing Oficial</button>
      </div>`;

    container.appendChild(card);
  });
}

function toggleCard(round){
  const body = document.getElementById('body-'+round);
  if(!body) return;
  const isOpen = body.classList.contains('open');
  if(isOpen){ body.classList.remove('open'); openCards.delete(round); }
  else { body.classList.add('open'); openCards.add(round); }
}

function filterGP(filter, btn){
  currentFilter = filter;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGPs(filter);
}

function startTimers(){
  Object.values(timers).forEach(t => clearInterval(t));
  timers = {};
  GPS.forEach(gp => {
    if(getStatus(gp) === 'upcoming'){
      timers[gp.round] = setInterval(() => {
        const el = document.getElementById('timer-'+gp.round);
        if(el) el.textContent = getCountdown(gp.eventStart) || '¡Ahora!';
      }, 1000);
    }
  });
}

function findNext(){
  const now = new Date();
  const next = GPS.find(g => new Date(g.eventStart) > now);
  if(next){
    const parts = next.name.split(' ');
    document.getElementById('sumNext').textContent = parts[0];
  }
}

findNext();
renderGPs('all');
</script>
</body>
</html>
